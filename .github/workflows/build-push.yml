name: Build and Push — julia-comfyui-ipadapter

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.digital-ai.tech
  IMAGE_NAME: registry.digital-ai.tech/julia-comfyui-ipadapter

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          SHA8=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "sha8=${SHA8}" >> $GITHUB_OUTPUT
          echo "Building image: ${{ env.IMAGE_NAME }}:${SHA8}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha8 }}
          # Cache via registry (sem S3 extra)
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Verify push
        run: |
          echo "Image pushed successfully:"
          echo "  ${{ env.IMAGE_NAME }}:latest"
          echo "  ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha8 }}"
          echo ""
          echo "Verify with:"
          echo "  curl -su USER:PASS https://registry.digital-ai.tech/v2/julia-comfyui-ipadapter/tags/list | jq ."
